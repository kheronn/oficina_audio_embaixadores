<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wenceslau MP3 Player</title>
    <style>
        /* Reset e Estilo de Fundo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            /* SUBSTITUA PELO LINK DA SUA IMAGEM DO WENCESLAU TOMBADO */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://github.com/kheronn/oficina_audio_embaixadores/blob/main/tombamento.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .player-card {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .album-art {
            width: 150px;
            height: 150px;
            background: #222;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 5px solid #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            animation: spin 10s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h2 { margin-bottom: 5px; letter-spacing: 1px; }
        p { color: #ccc; margin-bottom: 25px; font-size: 0.9em; }

        /* Controles */
        .progress-area {
            width: 100%;
            margin-bottom: 20px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff0000;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 5px;
            color: #ddd;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-play { background: #ff0000; color: white; }
        .btn-pause { background: white; color: black; }
        
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Input de URL */
        .url-box {
            display: flex;
            gap: 5px;
        }

        .url-box input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 12px;
        }

        .btn-load { background: #28a745; color: white; padding: 10px; border-radius: 5px; font-size: 10px; }
    </style>
</head>
<body>

    <audio id="main-audio" src=""></audio>

    <div class="player-card">
        <div class="album-art" id="disc">🎵</div>
        <h2>Wenceslau Braz Hit</h2>
        <p>Capital do Tombamento</p>

        <div class="progress-area">
            <input type="range" id="seek-bar" value="0" max="100">
            <div class="time-labels">
                <span id="current">0:00</span>
                <span id="total">0:00</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-play" onclick="playAudio()">Play</button>
            <button class="btn-pause" onclick="pauseAudio()">Pause</button>
        </div>

        <div class="url-box">
            <input type="text" id="audio-url" placeholder="Cole a URL do MP3 aqui...">
            <button class="btn-load" onclick="loadAudio()">CARREGAR</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const seekBar = document.getElementById('seek-bar');
        const currentTimeEl = document.getElementById('current');
        const durationEl = document.getElementById('total');
        const disc = document.getElementById('disc');

        function loadAudio() {
            const url = document.getElementById('audio-url').value;
            if(url) {
                audio.src = url;
                audio.load();
                alert("Áudio carregado! Clique em Play.");
            }
        }

        function playAudio() {
            if(audio.src) {
                audio.play();
                disc.style.animationPlayState = 'running';
            } else {
                alert("Por favor, carregue uma URL de MP3 primeiro.");
            }
        }

        function pauseAudio() {
            audio.pause();
            disc.style.animationPlayState = 'paused';
        }

        // Atualiza a barra de progresso conforme a música toca
        audio.ontimeupdate = function() {
            if (audio.duration) {
                const percentage = (audio.currentTime / audio.duration) * 100;
                seekBar.value = percentage;
                
                currentTimeEl.innerText = formatTime(audio.currentTime);
                durationEl.innerText = formatTime(audio.duration);
            }
        };

        // Permite arrastar a barra para mudar o tempo da música
        seekBar.oninput = function() {
            const seekTo = (seekBar.value / 100) * audio.duration;
            audio.currentTime = seekTo;
        };

        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            if (sec < 10) sec = `0${sec}`;
            return `${min}:${sec}`;
        }

        // Resetar o disco quando a música acabar
        audio.onended = function() {
            disc.style.animationPlayState = 'paused';
        };
    </script>
</body>
</html>
