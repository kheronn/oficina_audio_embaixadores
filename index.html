<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wenceslau Dead - Official Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            /* IMAGEM DE FUNDO: Substitua o link abaixo pela imagem que desejar */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1519074069444-1ba4fff66d16?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .player-container {
            width: 90%;
            max-width: 400px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        /* Capa do Álbum (Estilo Vinil) */
        .album-cover {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            background: #111;
            border-radius: 50%;
            border: 8px solid rgba(255, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            animation: spin 12s linear infinite;
            animation-play-state: paused;
        }

        .album-cover::after {
            content: '';
            width: 40px;
            height: 40px;
            background: #141414;
            border-radius: 50%;
            border: 4px solid #333;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; color: #fff; }
        p { font-size: 0.9rem; color: #aaa; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        /* Timeline / Barra de Progresso */
        .timeline-box {
            width: 100%;
            margin-bottom: 30px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            accent-color: #ff0000; /* Cor da bolinha e trilha */
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #777;
            margin-top: 8px;
            font-family: monospace;
        }

        /* Botões de Controle */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            width: 70px;
            height: 70px;
            background: #ff0000;
            border-radius: 50%;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: #cc0000;
        }

        .pause-btn {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            color: black;
            display: none; /* Começa escondido */
        }

        .pause-btn:hover {
            transform: scale(1.1);
            background: #ddd;
        }

        svg { fill: currentColor; width: 24px; height: 24px; }

    </style>
</head>
<body>

    <audio id="audio-player" src="https://github.com/kheronn/oficina_audio_embaixadores/blob/main/capital_tombamento.mp3"></audio>

    <div class="player-container">
        <div class="album-cover" id="album-spin"></div>
        
        <h1>Wenceslau Dead</h1>
        <p>Capital do Tombamento</p>

        <div class="timeline-box">
            <input type="range" id="seek-bar" value="0" max="100">
            <div class="time-info">
                <span id="current-time">00:00</span>
                <span id="total-duration">00:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn play-btn" id="play-node" onclick="togglePlay(true)">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
            
            <button class="control-btn pause-btn" id="pause-node" onclick="togglePlay(false)">
                <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-node');
        const pauseBtn = document.getElementById('pause-node');
        const seekBar = document.getElementById('seek-bar');
        const currentTimeText = document.getElementById('current-time');
        const durationText = document.getElementById('total-duration');
        const albumSpin = document.getElementById('album-spin');

        function togglePlay(isPlay) {
            if (isPlay) {
                audio.play();
                playBtn.style.display = 'none';
                pauseBtn.style.display = 'flex';
                albumSpin.style.animationPlayState = 'running';
            } else {
                audio.pause();
                playBtn.style.display = 'flex';
                pauseBtn.style.display = 'none';
                albumSpin.style.animationPlayState = 'paused';
            }
        }

        // Atualiza a barra de progresso
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            seekBar.value = pct || 0;
            currentTimeText.innerText = formatTime(audio.currentTime);
        };

        // Carrega a duração total quando o áudio estiver pronto
        audio.onloadedmetadata = () => {
            durationText.innerText = formatTime(audio.duration);
        };

        // Busca (Seek) na música
        seekBar.oninput = () => {
            const time = (seekBar.value / 100) * audio.duration;
            audio.currentTime = time;
        };

        // Formatação de tempo (00:00)
        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return `${min < 10 ? '0' + min : min}:${sec < 10 ? '0' + sec : sec}`;
        }

        // Se a música acabar, reseta o botão
        audio.onended = () => {
            togglePlay(false);
            seekBar.value = 0;
        };
    </script>
</body>
</html>
