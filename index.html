<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wenceslau Dead - Player Oficial</title>
    <style>
        /* Estilização Geral */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* IMAGEM DE FUNDO: Substitua pela URL da imagem que geramos ou uma de sua preferência */
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://github.com/kheronn/oficina_audio_embaixadores/blob/main/tombamento.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .player-card {
            width: 90%;
            max-width: 420px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        /* Disco de Vinil / Capa */
        .vinyl-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 35px;
            position: relative;
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            background: #111;
            background-image: repeating-radial-gradient(circle, #222 0%, #111 2px, #222 4px);
            border-radius: 50%;
            border: 10px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            animation: rotate 10s linear infinite;
            animation-play-state: paused;
        }

        /* Centro do disco (selo) */
        .vinyl-center {
            width: 80px;
            height: 80px;
            background: #ff0000;
            border-radius: 50%;
            border: 5px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            font-size: 10px;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 1.6rem; margin-bottom: 8px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .subtitle { font-size: 0.8rem; color: #ff0000; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; }

        /* Barra de Progresso */
        .progress-container {
            width: 100%;
            margin-bottom: 30px;
        }

        #seek-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 10px;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            cursor: pointer;
            overflow: hidden;
        }

        /* Estilo da "bolinha" do slider no Chrome/Safari */
        #seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: -407px 0 0 400px #ff0000;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #888;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Controles de Áudio */
        .control-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-btn {
            width: 80px;
            height: 80px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
        }

        .main-btn:hover {
            transform: scale(1.1);
            background: #e60000;
        }

        .main-btn:active { transform: scale(0.95); }

        .hidden { display: none; }

        svg { width: 32px; height: 32px; fill: currentColor; }

    </style>
</head>
<body>

    <audio id="track" src="./capital.mp3"></audio>

    
    <div class="player-card">
        <div class="vinyl-container">
            <div class="vinyl-disc" id="vinyl">
                <div class="vinyl-center">W. BRAZ</div>
            </div>
        </div>
        
        <h1>Wenceslau Dead</h1>
        <p class="subtitle">Norte Pioneiro • PR-092</p>

        <div class="progress-container">
            <input type="range" id="seek-bar" value="0" step="0.1" max="100">
            <div class="time-display">
                <span id="current-time">00:00</span>
                <span id="total-duration">00:00</span>
            </div>
        </div>

        <div class="control-area">
            <button class="btn main-btn" id="play-btn" onclick="controlPlayer('play')">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
            
            <button class="btn main-btn hidden" id="pause-btn" onclick="controlPlayer('pause')">
                <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('track');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const seekBar = document.getElementById('seek-bar');
        const vinyl = document.getElementById('vinyl');
        const curTimeText = document.getElementById('current-time');
        const durText = document.getElementById('total-duration');

        // Função de Play/Pause
        function controlPlayer(action) {
            if (action === 'play') {
                audio.play().catch(e => alert("Erro: O arquivo 'musica.mp3' não foi encontrado na pasta."));
                playBtn.classList.add('hidden');
                pauseBtn.classList.remove('hidden');
                vinyl.style.animationPlayState = 'running';
            } else {
                audio.pause();
                playBtn.classList.remove('hidden');
                pauseBtn.classList.add('hidden');
                vinyl.style.animationPlayState = 'paused';
            }
        }

        // Atualiza a barra conforme a música toca
        audio.ontimeupdate = () => {
            if (!isNaN(audio.duration)) {
                const progress = (audio.currentTime / audio.duration) * 100;
                seekBar.value = progress;
                curTimeText.innerText = formatSeconds(audio.currentTime);
            }
        };

        // Carrega a duração total
        audio.onloadedmetadata = () => {
            durText.innerText = formatSeconds(audio.duration);
        };

        // Arrastar a barra para mudar o tempo
        seekBar.oninput = () => {
            const targetTime = (seekBar.value / 100) * audio.duration;
            audio.currentTime = targetTime;
        };

        // Formata segundos em MM:SS
        function formatSeconds(sec) {
            let minutes = Math.floor(sec / 60);
            let seconds = Math.floor(sec % 60);
            return `${minutes < 10 ? '0' + minutes : minutes}:${seconds < 10 ? '0' + seconds : seconds}`;
        }

        // Quando a música acaba
        audio.onended = () => {
            controlPlayer('pause');
            seekBar.value = 0;
        };

        // Erro se o arquivo não existir
        audio.onerror = () => {
            console.error("Não foi possível carregar o arquivo musica.mp3");
        };
    </script>
</body>
</html>
